<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Extension Setup</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    p.sub { color: #555; font-size: 0.9rem; margin-top: 0; }
    section { margin-top: 28px; }
    h2 { font-size: 1rem; margin-bottom: 6px; }
    label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 4px; }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 0.85rem;
      border: 1px solid #bbb;
      border-radius: 4px;
      padding: 6px 8px;
    }
    textarea { height: 180px; resize: vertical; }
    button {
      margin-top: 24px;
      padding: 9px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #1558b0; }
    #status {
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 1.2em;
    }
    #status.ok  { color: #188038; }
    #status.err { color: #c5221f; }
    .note {
      background: #fff8e1;
      border-left: 3px solid #f9a825;
      padding: 8px 12px;
      font-size: 0.85rem;
      margin-top: 8px;
      border-radius: 0 4px 4px 0;
    }
  </style>
</head>
<body>
  <h1>Dashboard Extension — First-Time Setup</h1>
  <p class="sub">Credentials are saved only to this computer. They survive extension updates and Chrome restarts.</p>

  <section>
    <h2>Google Service Account</h2>
    <div class="note">Paste the values from the service account JSON file for the Drive sync feature.</div>
    <br>
    <label>Client Email</label>
    <input type="text" id="sa_email" placeholder="example@project.iam.gserviceaccount.com">
    <br><br>
    <label>Private Key (include the BEGIN/END lines)</label>
    <textarea id="sa_key" placeholder="-----BEGIN PRIVATE KEY-----&#10;...&#10;-----END PRIVATE KEY-----"></textarea>
  </section>

  <section>
    <h2>Slack</h2>
    <label>Bot Token</label>
    <input type="text" id="slack_token" placeholder="xoxb-...">
  </section>

  <button id="save">Save to this computer</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
